services:
  - type: web
    name: mindSupport-1
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mindsupport-uqms.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
